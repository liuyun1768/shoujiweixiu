# 宝塔：网站 → 配置文件 → 在 server {} 内合并修改
# 假设前端打包目录：/www/wwwroot/shoujiweixiu/dist
# Node API 监听 127.0.0.1:3001（PM2 托管）

server {
    listen 80;
    server_name your-domain.com;
    root /www/wwwroot/shoujiweixiu/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 用户上传图片（项目根 images/；URL 按需调整）
    # location /images/ {
    #     alias /vol1/shoujiweixiu/images/;
    #     access_log off;
    #     expires 7d;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
