# 飞牛 NAS / 内网：Nginx 托管 frontend/dist + 分流 API
#
# 要求：
#   1) 本机已启动 Node 后端（默认 3001）：cd backend && node dist/index.js
#   2) 本机已启动 vite preview（4173，承载 /api/sf/*）：cd frontend && npx vite preview --host 0.0.0.0 --port 4173
#   3) 将下方 root 改为你的 frontend/dist 绝对路径
#   4) include 到 http{} 或 sites-enabled，nginx -t && reload
#
# 路由逻辑：
#   /api/sf/*  → 127.0.0.1:4173（推荐：少一跳；Vite + sfDevPlugin 读 frontend/.env*）
#   其他 /api/* → 127.0.0.1:3001（Express + SQLite）
#   /*        → 静态 SPA（dist）
# 说明：若误把 /api/sf 也打到 3001，新版 Express 会再转发到 4173，顺丰仍可下单（但务必保持 vite preview 常驻）。

server {
    listen 80;
    server_name _;

    # 本仓库在 NAS 上的路径（若你迁目录，只改这一行）
    root /vol1/shoujiweixiu/frontend/dist;
    index index.html;

    charset utf-8;
    client_max_body_size 80m;

    # 顺丰打单：必须先于通用 /api/；匹配 /api/sf、/api/sf/、/api/sf/health 等（勿写成仅 /api/sf/ 漏匹配）
    location ^~ /api/sf {
        proxy_pass http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 维修订单等业务 API（Express）
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
